# This is a basic workflow to help you get started with Actions

name: Demo Github Action - Dotnet Pipeline

# Controls when the workflow will run
on: 
  # Triggers the workflow on push or pull request events but only for the "main" branch
#   push:
#     branches: [ "main", "dev", "qa", "features" ]
  # pull_request:
  #   branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  issues: write


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
            dotnet-version: '10.0.x'
      
      - name: Install Dependencies
        run: dotnet restore ./MyDemoApp/MyDemoApp.csproj

      - name: Build
        run: dotnet build ./MyDemoApp/MyDemoApp.csproj --configuration Release --no-restore

      - name: Test with the dotnet CLI
        run: dotnet test ./MyDemoApp/MyDemoApp.csproj --configuration Release --no-build --verbosity normal

      - name: Publish Application
        run: dotnet publish ./MyDemoApp/MyDemoApp.csproj \
             --configuration Release \
             --output ./publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
         name: dotnet-app
         path: ./publish
       
          
  deploy:

    needs: build
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    environment:
      name: Dev

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:

      # - name: Wait for approval
      #   uses: trstringer/manual-approval@v1
      #   with:
      #     secret: ${{ secrets.GITHUB_TOKEN }}
      #     approvers: atulshelke,namdevrpatil
      #     minimum-approvals: 1
      #     issue-title: "Manual Approval Required for Deployment"
      #     issue-body: "Please approve or deny the deployment."
      
      # Runs a single command using the runners shell
      - name: Deploy script
        run: echo Hello, world! from Deploy job

     
